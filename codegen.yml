overwrite: true
errorsOnly: true
schema: http://localhost:3000/api/graphql
documents:
  - './src/components/**/*.tsx'
  - './src/pages/**/*.tsx'
generates:
  ./src/graphql/schema.graphql:
    plugins:
      - schema-ast
  ./src/generated/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-graphql-request
