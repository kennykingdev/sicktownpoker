type Mutation {
  createPlayer(input: PlayerCreationInput!): Player!
  deletePlayer(playerId: String!): Player!
  updatePlayer(input: PlayerUpdateInput!): Player!
}

type Player {
  email: String
  firstName: String!
  fullName: String!
  id: ID!
  lastName: String!
  phone: String
  referralCount: Int!
  referredByPlayer: Player
  referredPlayers: [Player!]!
  shareContactInfo: Boolean!
}

input PlayerCreationInput {
  email: String
  firstName: String!
  lastName: String!
  phone: String
  referredByPlayerId: String
  shareContactInfo: Boolean
}

input PlayerUpdateInput {
  email: String
  firstName: String
  id: String!
  lastName: String
  phone: String
  referredByPlayerId: String
  shareContactInfo: Boolean
}

type Query {
  player(id: String!): Player!
  players: [Player!]!
}
