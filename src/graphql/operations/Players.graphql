fragment FullPlayerDetails on Player {
  id
  fullName
  firstName
  lastName
  email
  phone
  shareContactInfo
  referredByPlayer {
    id
    fullName
  }
  referralCount
}

query PlayersIndex {
  players {
    id
    fullName
  }
}

query getPlayerDetails($playerId: String!) {
  player(id: $playerId) {
    ...FullPlayerDetails
  }
}

mutation CreatePlayer($input: PlayerCreateInput!) {
  createPlayer(input: $input) {
    id
    fullName
  }
}

mutation DeletePlayer($playerId: String!) {
  deletePlayer(playerId: $playerId) {
    id
  }
}

mutation UpdatePlayer($input: PlayerUpdateInput!) {
  updatePlayer(input: $input) {
    ...FullPlayerDetails
  }
}
